{% extends "base.html" %}

{% block core %}
<h1 class="title">Add folder</h1>

<form action="{{ url("folders", "add") }}" method="POST" name="add_folder" style="display:inline;">
  {{ xsrf_form_html|safe }}
  <table class="sub_table">
    <tr>
      <td>Name</td>
      <td><input type="text" name="name" required/></td>
    </tr>
    <tr>
      <td>Description</td>
      <td><input type="text" name="description" required/></td>
    </tr>
    <tr>
      <td>Parent</td>
      <td>
        <select name="parent_id">
          <option value="none">(root)</option>
          {% for f in all_folders %}
          <option value="{{ f.id }}">{{ f.description }}</option>
          {% endfor %}
        </select>
      </td>
    </tr>
    <tr>
      <td>Hidden (unlisted in contest server)</td>
      <td><input type="checkbox" name="hidden" value="1"/></td>
    </tr>
  </table>
  <input type="submit" name="operation" value="Create"/>
  <input type="submit" name="operation" value="Create and add another"/>
</form>

{% endblock core %}
