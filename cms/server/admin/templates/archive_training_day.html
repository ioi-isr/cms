{% extends "base.html" %}

{% block core %}
{% set back_url = back_url|default(url("training_program", training_program.id, "training_days")) %}
{% include "fragments/modal_archive_training_day.html" %}

<script>
(function() {
    var modalId = 'modal-archive-td-{{ training_day.id }}';
    var modal = document.getElementById(modalId);
    if (modal) {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
    }

    document.addEventListener('DOMContentLoaded', function() {
        var backUrl = {{ back_url|tojson }};
        if (typeof MicroModal !== 'undefined') {
            MicroModal.show(modalId, {
                onClose: function() {
                    window.location = backUrl;
                }
            });
        }
    });
})();
</script>
{% endblock core %}
