<!-- Histogram Modal (Micromodal) -->
<div class="modal modal--wide" id="modal-histogram" aria-hidden="true">
  <div class="modal__overlay" tabindex="-1" data-micromodal-close>
    <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="histogramTitle">
      <header class="modal__header">
        <h2 class="modal__title" id="histogramTitle">Score Distribution</h2>
        <button class="modal__close" aria-label="Close modal" data-micromodal-close>&times;</button>
      </header>
      <main class="modal__content">
        <div class="histogram-filter-row">
          <label for="histogramTagsFilter">Filter by student tags:</label>
          <input type="text" id="histogramTagsFilter" style="min-width: 300px;" placeholder="Select tags to filter..." />
        </div>
        <div class="histogram-chart-container">
          <div id="histogramBars" class="histogram-bars"></div>
        </div>
        <div id="histogramStats" class="histogram-stats"></div>
        <div class="histogram-text-section">
          <div class="histogram-text-header">
            <span>Text Data (for copying)</span>
            <button type="button" class="copy-btn" onclick="copyHistogramData()">Copy to Clipboard</button>
          </div>
          <textarea id="histogramTextData" readonly rows="10"></textarea>
        </div>
      </main>
    </div>
  </div>
</div>
