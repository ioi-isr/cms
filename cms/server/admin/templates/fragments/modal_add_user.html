{% if admin.permission_all %}
<div class="modal modal--medium" id="modal-add-user" aria-hidden="true">
    <div class="modal__overlay" tabindex="-1" data-micromodal-close>
        <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-add-user-title">
            <header class="modal__header">
                <h2 class="modal__title" id="modal-add-user-title">New user</h2>
                <button class="modal__close" aria-label="Close modal" data-micromodal-close>&times;</button>
            </header>
            <main class="modal__content">
                <form id="add-user-form" enctype="multipart/form-data" action="{{ url("users", "add") }}" method="POST">
                    {{ xsrf_form_html|safe }}
                    {% set user = None %}
                    {% from "macro/user_fields.html" import user_fields with context %}
                    {{ user_fields(None) }}
                </form>
            </main>
            <footer class="modal__footer">
                <button type="button" class="button" data-micromodal-close><span>Cancel</span></button>
                <button type="submit" form="add-user-form" class="button is-primary"><span>Create user</span></button>
            </footer>
        </div>
    </div>
</div>
{% endif %}
